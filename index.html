<!doctype html>
<html lang="zh-CN" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#F6F4EF" />
    <meta name="theme-color" content="#121110" media="(prefers-color-scheme: dark)" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("scratchpad.theme");
          if (saved === "day" || saved === "night" || saved === "auto") {
            document.documentElement.setAttribute("data-theme", saved);
          }
        } catch (_) {}
      })();
      // iPad 没 devtools — 任何脚本错误顶上糊一条红条，方便远程诊断
      (function () {
        function show(text) {
          var bar = document.getElementById("__errBar");
          if (!bar) {
            bar = document.createElement("div");
            bar.id = "__errBar";
            bar.style.cssText = "position:fixed;left:0;right:0;top:0;z-index:9999;padding:8px 12px;background:#c0392b;color:#fff;font:13px/1.4 system-ui;white-space:pre-wrap;word-break:break-word;max-height:50vh;overflow:auto";
            bar.addEventListener("click", function () { bar.remove(); });
            (document.body || document.documentElement).appendChild(bar);
          }
          bar.textContent = "⚠ " + text + "  (点击关闭)";
        }
        window.__sp_showFatal = show;
        window.addEventListener("error", function (e) {
          var m = (e && e.message) || (e && e.error && (e.error.message || String(e.error))) || "脚本错误";
          var src = e && e.filename ? " (" + e.filename.split("/").pop() + ":" + e.lineno + ")" : "";
          show(m + src);
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e && e.reason;
          show((r && r.message) || String(r || "promise rejection"));
        });
      })();
    </script>
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ScratchPad" />
    <title>ScratchPad</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="icon" href="./icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180.png" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <canvas id="board" class="board" aria-label="scratch board"></canvas>

    <!-- 文字 + LaTeX 块：DOM 浮层，世界坐标 (随 viewport transform 缩放) -->
    <div id="textOverlay" class="text-overlay" aria-hidden="true">
      <div id="textOverlayInner" class="text-overlay-inner"></div>
    </div>

    <!-- 编辑器：纯 textarea，回车 commit，Shift+Enter 换行，Esc 取消 -->
    <div id="textEditorWrap" class="text-editor-wrap hidden">
      <textarea id="textEditor" class="text-editor" spellcheck="false"
        placeholder="文字 + LaTeX · Enter 提交"></textarea>
    </div>

    <!-- T 工具按下拖动时的预览矩形 -->
    <div id="textDraftRect" class="text-draft-rect hidden" aria-hidden="true"></div>

    <!-- 顶栏：工具 + 状态 -->
    <header class="top-bar" id="topBar">
      <div class="tool-group" role="group" aria-label="tools">
        <button class="tool" id="toolPen" type="button" data-tool="pen" aria-pressed="true" title="笔 (P)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
            <path d="M2 2l7.586 7.586"></path>
            <circle cx="11" cy="11" r="2"></circle>
          </svg>
        </button>
        <button class="tool" id="toolEraser" type="button" data-tool="eraser" title="橡皮 (E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 20H7L3 16a2 2 0 0 1 0-2.83l9-9a2 2 0 0 1 2.83 0l5.17 5.17a2 2 0 0 1 0 2.83L11 21"></path>
            <path d="M14 7l3 3"></path>
          </svg>
        </button>
        <button class="tool" id="toolHand" type="button" data-tool="hand" title="平移 (H / Space)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 11V6a2 2 0 0 0-4 0v5"></path>
            <path d="M14 10V4a2 2 0 0 0-4 0v6"></path>
            <path d="M10 10.5V6a2 2 0 0 0-4 0v9"></path>
            <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-1-5.6-2.8l-3.4-5.4a2 2 0 0 1 3.4-2L8 14"></path>
          </svg>
        </button>
        <button class="tool" id="toolText" type="button" data-tool="text" title="文字 + LaTeX (T)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="4 7 4 4 20 4 20 7"></polyline>
            <line x1="9" y1="20" x2="15" y2="20"></line>
            <line x1="12" y1="4" x2="12" y2="20"></line>
          </svg>
        </button>
      </div>

      <div class="color-group" role="group" aria-label="color">
        <button class="swatch" data-color="ink" style="--c: var(--ink-color)" title="墨" aria-pressed="true"></button>
        <button class="swatch" data-color="#e53935" style="--c: #e53935" title="红"></button>
        <button class="swatch" data-color="#1e88e5" style="--c: #1e88e5" title="蓝"></button>
        <button class="swatch" data-color="#43a047" style="--c: #43a047" title="绿"></button>
      </div>

      <label class="width-group" title="笔粗">
        <input id="widthSlider" type="range" min="1" max="12" step="0.5" value="2.2" aria-label="笔粗" />
      </label>

      <button class="tool" id="pressureButton" type="button" title="压感（默认关）" aria-pressed="false">
        <!-- 细→粗的楔形：代表压感变化 -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="12" x2="21" y2="7"></line>
          <line x1="3" y1="12" x2="21" y2="17"></line>
        </svg>
      </button>

      <div class="spacer"></div>

      <button class="tool" id="undoButton" type="button" title="撤销 (Ctrl+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 14 4 9 9 4"></polyline>
          <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
        </svg>
      </button>
      <button class="tool" id="redoButton" type="button" title="重做 (Ctrl+Shift+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 14 20 9 15 4"></polyline>
          <path d="M4 20v-7a4 4 0 0 1 4-4h12"></path>
        </svg>
      </button>

      <button class="tool" id="gridButton" type="button" title="网格 (G)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="1"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
          <line x1="15" y1="3" x2="15" y2="21"></line>
          <line x1="3" y1="9" x2="21" y2="9"></line>
          <line x1="3" y1="15" x2="21" y2="15"></line>
        </svg>
      </button>

      <button class="tool" id="fitButton" type="button" title="回到原点 (0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <line x1="12" y1="2" x2="12" y2="5"></line>
          <line x1="12" y1="19" x2="12" y2="22"></line>
          <line x1="2" y1="12" x2="5" y2="12"></line>
          <line x1="19" y1="12" x2="22" y2="12"></line>
        </svg>
      </button>

      <button class="tool" id="exportButton" type="button" title="导出">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>

      <button class="tool" id="clearButton" type="button" title="清空（不可撤销 — 烧掉）">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
          <path d="M10 11v6"></path>
          <path d="M14 11v6"></path>
        </svg>
      </button>

      <button class="tool" id="themeButton" type="button" title="主题">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </header>

    <!-- HUD：缩放 / 坐标 / 状态 -->
    <div class="hud" id="hud">
      <span id="zoomLabel">100%</span>
      <span class="sep" aria-hidden="true">·</span>
      <span id="statusLabel">就绪</span>
    </div>

    <!-- Export sheet -->
    <div id="exportBackdrop" class="backdrop hidden" aria-hidden="true"></div>
    <div id="exportSheet" class="sheet hidden" role="dialog" aria-label="导出">
      <h3>导出 / 分享</h3>
      <button class="sheet-action" data-export="copy-view">复制 PNG · 当前视图（→剪贴板）</button>
      <button class="sheet-action" data-export="share-all" id="shareAllBtn" hidden>分享 PNG · 全部内容</button>
      <button class="sheet-action" data-export="png-view">下载 PNG · 当前视图</button>
      <button class="sheet-action" data-export="png-all">下载 PNG · 全部内容</button>
      <button class="sheet-action" data-export="pdf-all">下载 PDF · 全部内容</button>
      <button class="sheet-action ghost" data-export="cancel">取消</button>
    </div>

    <!-- Clear confirm -->
    <div id="clearBackdrop" class="backdrop hidden" aria-hidden="true"></div>
    <div id="clearSheet" class="sheet hidden" role="dialog" aria-label="清空确认">
      <h3>烧掉所有笔记？</h3>
      <p class="sheet-hint">阅后即焚 — 没有 library，没有回收站。清空之后这一页就空白了。</p>
      <button class="sheet-action danger" data-clear="confirm">烧掉</button>
      <button class="sheet-action ghost" data-clear="cancel">取消</button>
    </div>

    <!-- 更新 toast -->
    <div id="updateToast" class="toast hidden" role="status" aria-live="polite">
      <span>有新版本</span>
      <button id="updateToastReload" type="button">刷新</button>
      <button id="updateToastDismiss" type="button" class="dismiss" aria-label="忽略">×</button>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
