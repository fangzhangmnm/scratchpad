# 部署 GitHub Pages：prod 分支 → /(线上真用户)，main 分支 → /dev/(日常工作)。
# 抄 RealHome/WebPaint .github/workflows/deploy.yml（家族 mature paradigm）。各分支自己已 commit
# 好 dist/scratchpad-<hash>.mjs（人手跑 scripts/build.sh 后 commit）。本 workflow 只「组合两分支
# → upload」，**不在 CI 里 build**，快且确定。
#
# 第一次 setup（顺序要紧——切前 origin/main = deploy-from-branch 的线上）：
#   ① 建 prod 分支 = 当前线上：git branch prod <当前线上 sha> && git push origin prod（已做）
#   ② GitHub Settings → Pages → Source 改 "GitHub Actions"（不是 deploy-from-branch）
#   ③ 之后 push main 才安全（此前 push main 会直接上 prod）
#
# 注：prod 分支首次 = 旧 raw-module app（index.html 直 load ./src/app.js，无 dist/）；main =
# 新 bundled（load ./dist/scratchpad-<hash>.mjs）。compose 整个 src/ + dist/ 都拷，两种形态都成立。
# promote（ff-merge main→prod）后 prod 也变 bundled，自然对称。
name: Deploy Pages

on:
  push:
    branches: [main, prod]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true   # 新 push 取消在跑的旧 workflow,最后一次必赢(prod race 防踩)

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout prod branch
        uses: actions/checkout@v4
        with:
          ref: prod
          path: prod-tree

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-tree

      - name: Compose site (prod=/, main=/dev/)
        run: |
          mkdir -p site/dev
          for f in index.html manifest.webmanifest service-worker.js \
                   icon.svg icon-192.png icon-512.png apple-touch-icon-180.png; do
            cp -p prod-tree/$f site/     2>/dev/null || true
            cp -p main-tree/$f site/dev/ 2>/dev/null || true
          done
          # 整个 src/(含 vendor + styles + version.js + raw 模块) + dist/(bundle) 都拷。
          # 运行时 vendor 库按 ./src/vendor/... 注入，故 src/ 必须在；raw 模块虽已 bundle 但拷着无害。
          cp -r prod-tree/src  site/src     2>/dev/null || true
          cp -r main-tree/src  site/dev/src 2>/dev/null || true
          cp -r prod-tree/dist site/dist     2>/dev/null || true
          cp -r main-tree/dist site/dev/dist 2>/dev/null || true
          # /dev/ 保留自己的 SW（上面 for 循环已 cp 到 site/dev/）：dev SW 按 scope 走 network-first
          # —— 在线「改完即见」不变，离线才回退缓存。别在这里删 dev SW = 把「闪退离线打不开」坑种回来。

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
