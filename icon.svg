<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#f6f4ef"/>
  <!-- grid -->
  <g stroke="#d8d2c4" stroke-width="3">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- 公式草稿：E = mc² -->
  <g fill="none" stroke="#1b1b1b" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- E -->
    <path d="M120 200 L200 200 M120 200 L120 320 L200 320 M120 260 L185 260"/>
    <!-- = -->
    <line x1="225" y1="245" x2="285" y2="245"/>
    <line x1="225" y1="285" x2="285" y2="285"/>
    <!-- m -->
    <path d="M310 320 L310 240 Q310 220 330 220 Q350 220 350 240 L350 320 M350 240 Q350 220 370 220 Q390 220 390 240 L390 320"/>
    <!-- c -->
    <path d="M448 245 Q420 245 420 275 Q420 305 448 305"/>
  </g>
  <!-- 上标 ² -->
  <path d="M460 220 Q470 215 478 220 Q484 226 472 236 L460 248 L484 248"
        fill="none" stroke="#1b1b1b" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 铅笔 -->
  <g transform="translate(380 360) rotate(35)">
    <rect x="0" y="0" width="100" height="22" rx="3" fill="#e8b86b" stroke="#1b1b1b" stroke-width="4"/>
    <polygon points="100,0 130,11 100,22" fill="#fbf3e1" stroke="#1b1b1b" stroke-width="4" stroke-linejoin="round"/>
    <polygon points="125,7 132,11 125,15" fill="#1b1b1b"/>
    <rect x="-22" y="0" width="22" height="22" rx="3" fill="#d05a4a" stroke="#1b1b1b" stroke-width="4"/>
  </g>
</svg>
